name: Release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Publish v0.2.0 release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cat > "$RUNNER_TEMP/notes.md" <<'NOTES'
          ## Summary

          EBAC-T4 v0.2.0 is a stable reference artifact demonstrating deterministic trace-bound authorization for one high-risk EHR state-changing action: `ehr.submit_order`.

          This release freezes the current v0.2.x artifact for external review, citation, and archival via Zenodo.

          ## What this release demonstrates

          EBAC-T4 implements a deterministic pre-execution authorization gate for a single high-risk EHR write.

          The gate evaluates whether execution is allowed based on a fresh and complete evidence cycle, including required traces, trace freshness, cross-trace identity consistency, and HITL approval bound to the exact action context.

          The authorization decision is deterministic and returns one of:

          - ALLOW
          - DOWNGRADE
          - HALT

          ## Stabilization included

          This release includes the post-audit stabilization work completed for v0.2.x:

          - restored the freshness-check happy path;
          - added GitHub Actions pytest CI;
          - aligned README/spec/examples with implementation behavior;
          - made example payloads executable;
          - added tests covering examples;
          - added agent-readiness guidance through AGENTS.md;
          - added repository hygiene protections for generated/cache artifacts.

          ## Tests

          The pytest suite passes locally:

          ```
          14 passed
          ```

          The test suite covers the reference authorizer and executable examples.

          ## Scope and non-goals

          This is not production software.

          This release does not claim:

          - clinical validation;
          - real EHR integration;
          - production-grade security guarantees;
          - regulatory compliance;
          - replacement of RBAC, CDS, OPA, or schema validation;
          - a universal agent governance framework.

          The scope remains intentionally narrow: a reference implementation and specification for deterministic authorization of one high-risk EHR write action.

          ## Citation / Zenodo note

          This GitHub release is intended to be archived through Zenodo as a citable software artifact.

          Zenodo archival should be interpreted as a DOI-backed software snapshot, not as peer review, clinical validation, or scientific acceptance.
          NOTES
          gh release create v0.2.0 \
            --target 1288579253b47770b37d68710777acc1099d3506 \
            --title "EBAC-T4 v0.2.0 — Stable Reference Artifact" \
            --notes-file "$RUNNER_TEMP/notes.md" \
            --latest
